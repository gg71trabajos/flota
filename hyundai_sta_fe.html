<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>HYUNDAI STA FE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000d1a;color:#c8e8f0;font-family:'Rajdhani',sans-serif;min-height:100vh;padding:16px;}
.card{background:linear-gradient(135deg,#051828,#030f1e);border:1px solid rgba(0,245,255,0.2);border-radius:20px;max-width:420px;margin:0 auto;overflow:hidden;box-shadow:0 0 40px rgba(0,245,255,0.08);}
.card-top{position:relative;}.car-img{width:100%;height:180px;object-fit:cover;}
.car-img-overlay{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,#000d1a);}
.car-name{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;color:#fff;padding:14px 18px 2px;letter-spacing:2px;}
.car-placa{font-size:12px;color:rgba(0,245,255,0.7);padding:0 18px 12px;letter-spacing:3px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.3),transparent);margin:0 18px;}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:12px 18px;}
.data-item{padding:7px 0;}.data-item.full{grid-column:1/-1;}
.data-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#fff;opacity:0.7;margin-bottom:3px;}
.data-val{font-size:13px;font-weight:700;color:#fff;}.data-val.cyan{color:#00f5ff;}.data-val.yellow{color:#ffe600;}
.aceite-badge{display:inline-block;background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.2);border-radius:8px;padding:4px 10px;font-size:12px;color:#00f5ff;margin-top:3px;}
.section{padding:12px 18px;border-top:1px solid rgba(255,255,255,0.06);}
.sec-title{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:8px;color:rgba(255,255,255,0.45);}
.alert-row{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:6px;font-size:13px;font-weight:600;line-height:1.4;}
.alert-row.crit{background:rgba(255,45,120,0.12);border:1px solid rgba(255,45,120,0.3);color:#ffe600;}
.alert-row.warn{background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.25);color:#fff;}
.al-icon{flex-shrink:0;font-size:15px;}
.pend-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;}
.pend-row:last-child{border-bottom:none;}
.pnum{font-family:'Orbitron',monospace;font-size:11px;color:rgba(255,230,0,0.5);width:22px;flex-shrink:0;margin-top:1px;}
.ok-row{color:rgba(0,255,136,0.7);font-size:13px;}
.footer{text-align:center;padding:12px;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:1px;border-top:1px solid rgba(255,255,255,0.05);}
</style></head><body>
